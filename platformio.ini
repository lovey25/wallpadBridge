; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ─────────────────────────────────────────────────────────────
; 공통 ESP8266 설정 (d1_mini, esp12e 상속용)
; ─────────────────────────────────────────────────────────────
[common_esp8266]
platform = espressif8266
framework = arduino
monitor_speed = 74880
board_build.flash_mode = dio
upload_speed = 115200
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld
lib_deps =
    https://github.com/me-no-dev/ESPAsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3

; ─────────────────────────────────────────────────────────────
; D1 Mini — SoftwareSerial RS485 (D2=RX, D1=TX)
; ─────────────────────────────────────────────────────────────
[env:d1_mini]
extends = common_esp8266
board = d1_mini
build_flags = -DUSE_SOFTWARE_SERIAL

[env:d1_mini_ota]
extends = env:d1_mini
upload_protocol = espota
upload_port = 10.11.85.55

; ─────────────────────────────────────────────────────────────
; ESP12e — HardwareSerial UART0 swap (GPIO13=RX, GPIO15=TX)
; ─────────────────────────────────────────────────────────────
[env:esp12e]
extends = common_esp8266
board = esp12e
build_flags = -DUSE_HW_SERIAL_SWAP

[env:esp12e_ota]
extends = env:esp12e
upload_protocol = espota
upload_port = 10.11.85.65

; ─────────────────────────────────────────────────────────────
; ESP32 — HardwareSerial2 (GPIO16=RX, GPIO17=TX)
; ─────────────────────────────────────────────────────────────
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.3

[env:esp32_ota]
extends = env:esp32
upload_protocol = espota
upload_port = 10.11.85.65

