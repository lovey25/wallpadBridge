<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>RS485 Monitor - Wallpad Bridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📡 RS485 실시간 모니터</h1>
        <nav>
          <a href="/">대시보드</a>
          <a href="/monitor.htm" class="active">모니터</a>
          <a href="/config.htm">설정</a>
        </nav>
      </header>

      <div class="card">
        <h3>
          <span id="wsStatus" class="status-indicator status-disconnected"></span>
          WebSocket 상태: <span id="wsStatusText">연결 중...</span>
        </h3>
      </div>

      <div class="card">
        <h3>전송 진단</h3>
        <div id="txDiagPanel" class="hint-text">
          상태: <span id="diagStatus">확인 중...</span><br />
          큐: <span id="diagDepth">-</span> / 피크: <span id="diagPeak">-</span><br />
          누적 전송: <span id="diagSent">-</span> / 누적 큐잉: <span id="diagQueued">-</span><br />
          드롭: <span id="diagDropped">-</span> / 버스대기: <span id="diagBlocked">-</span> / 강제TX:
          <span id="diagForced">-</span><br />
          Heap: <span id="diagHeap">-</span> / RS485 idle(ms): <span id="diagIdle">-</span>
        </div>
      </div>

      <div class="card">
        <h3>필터</h3>
        <div class="filter-buttons">
          <button class="filter-btn active" onclick="toggleFilter('rx')">📥 RX (수신)</button>
          <button class="filter-btn active" onclick="toggleFilter('tx')">📤 TX (송신)</button>
          <button class="filter-btn active" onclick="toggleFilter('state')">🔄 상태 변경</button>
          <button class="filter-btn active" onclick="toggleFilter('error')">⚠️ 에러</button>
        </div>
      </div>

      <div class="card">
        <h3>로그 콘솔</h3>
        <div id="console"></div>
        <div class="controls">
          <button onclick="clearConsole()" class="secondary">🗑️ 지우기</button>
          <button onclick="toggleAutoScroll()" class="secondary" id="autoScrollBtn">⬇️ 자동스크롤: ON</button>
        </div>
      </div>

      <div class="card">
        <h3>RS485 명령 전송</h3>
        <div class="controls">
          <input type="text" id="cmdInput" placeholder="Hex 명령 입력 (예: F70B01190140110000B4EE)" />
          <button onclick="sendCommand()">📤 전송</button>
        </div>
        <p class="hint-text">💡 팁: 공백 없이 Hex 값만 입력하세요. 프로토콜은 wallpad_protocol.md 참고</p>
      </div>

      <div class="card">
        <h3>빠른 테스트 명령</h3>
        <div class="controls">
          <button onclick="sendQuickCmd('F70B01190140110000B4EE')">조명1 조회</button>
          <button onclick="sendQuickCmd('F70B012B014011000086EE')">환기 조회</button>
          <button onclick="sendQuickCmd('F70B01180145110000B0EE')">거실 난방 조회</button>
        </div>
      </div>
    </div>

    <script>
      // WebSocket 변수
      let websocket;
      let autoScroll = true;
      let filters = { rx: true, tx: true, state: true, error: true };
      let reconnectTimer = null;
      let reconnectDelayMs = 1000;
      let connectTimeoutTimer = null;
      let monitorPingTimer = null;
      let txDiagTimer = null;

      function sendMonitorPing() {
        fetch("/api/monitor/ping", {
          method: "POST",
          cache: "no-store",
          keepalive: true,
        }).catch(() => {
          // 네트워크 에러는 웹소켓 재연결 로직이 처리
        });
      }

      function startMonitorSession() {
        sendMonitorPing();
        if (monitorPingTimer) {
          clearInterval(monitorPingTimer);
        }
        monitorPingTimer = setInterval(sendMonitorPing, 4000);
      }

      function stopMonitorSession() {
        if (monitorPingTimer) {
          clearInterval(monitorPingTimer);
          monitorPingTimer = null;
        }

        if (txDiagTimer) {
          clearInterval(txDiagTimer);
          txDiagTimer = null;
        }

        if (navigator.sendBeacon) {
          navigator.sendBeacon("/api/monitor/leave");
        } else {
          fetch("/api/monitor/leave", { method: "POST", keepalive: true }).catch(() => {});
        }
      }

      function renderTxDiag(diag) {
        document.getElementById("diagStatus").textContent =
          `${diag.status || "-"}${diag.message ? " / " + diag.message : ""}`;
        document.getElementById("diagDepth").textContent = diag.depth ?? "-";
        document.getElementById("diagPeak").textContent = diag.peak ?? "-";
        document.getElementById("diagSent").textContent = diag.sent ?? "-";
        document.getElementById("diagQueued").textContent = diag.queued ?? "-";
        document.getElementById("diagDropped").textContent = diag.dropped ?? "-";
        document.getElementById("diagBlocked").textContent = diag.blocked ?? "-";
        document.getElementById("diagForced").textContent = diag.forced ?? "-";
        document.getElementById("diagHeap").textContent = diag.free_heap ?? "-";
        document.getElementById("diagIdle").textContent = diag.rs485_idle_ms ?? "-";
      }

      async function fetchTxDiag() {
        try {
          const response = await fetch("/api/rs485/diag", { cache: "no-store" });
          if (!response.ok) {
            document.getElementById("diagStatus").textContent = `diag error ${response.status}`;
            return;
          }
          const diag = await response.json();
          renderTxDiag(diag);
        } catch (error) {
          document.getElementById("diagStatus").textContent = "diag network error";
        }
      }

      function getWebSocketUrl() {
        const wsProto = window.location.protocol === "https:" ? "wss" : "ws";
        const wsHost = window.location.host || window.location.hostname;
        return `${wsProto}://${wsHost}/ws`;
      }

      function connectWebSocket() {
        // 기존 연결이 있으면 먼저 정리
        if (websocket) {
          if (websocket.readyState === WebSocket.OPEN || websocket.readyState === WebSocket.CONNECTING) {
            console.log("[WS] Closing existing connection before creating new one");
            websocket.onclose = null; // 재연결 방지
            websocket.close();
          }
        }

        // 재연결 타이머 클리어
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }

        const gateway = getWebSocketUrl();
        console.log("[WS] Connecting to:", gateway);
        websocket = new WebSocket(gateway);

        // CONNECTING 상태가 오래 지속되면 강제로 닫고 빠르게 재시도
        connectTimeoutTimer = setTimeout(() => {
          if (websocket && websocket.readyState === WebSocket.CONNECTING) {
            console.warn("[WS] Connect timeout, forcing reconnect");
            websocket.close();
          }
        }, 4000);

        websocket.onopen = function () {
          console.log("[WS] ✅ Connected successfully");
          reconnectDelayMs = 1000;
          if (connectTimeoutTimer) {
            clearTimeout(connectTimeoutTimer);
            connectTimeoutTimer = null;
          }
          updateWSStatus(true);
          addLog("WebSocket 연결됨", "log-state");
        };

        websocket.onclose = function () {
          if (connectTimeoutTimer) {
            clearTimeout(connectTimeoutTimer);
            connectTimeoutTimer = null;
          }
          console.log(`[WS] ❌ Connection closed, reconnecting in ${reconnectDelayMs}ms...`);
          updateWSStatus(false);
          addLog(`WebSocket 연결 끊김. ${Math.round(reconnectDelayMs / 1000)}초 후 재연결...`, "log-error");

          // 재연결 타이머 설정
          if (reconnectTimer) clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connectWebSocket, reconnectDelayMs);
          reconnectDelayMs = Math.min(reconnectDelayMs * 2, 5000);
        };

        websocket.onerror = function (error) {
          if (connectTimeoutTimer) {
            clearTimeout(connectTimeoutTimer);
            connectTimeoutTimer = null;
          }
          console.error("[WS] ❌ Error:", error);
          addLog("WebSocket 에러: " + error, "log-error");
        };

        websocket.onmessage = function (event) {
          const msg = event.data;
          let logClass = "log-rx";

          if (msg.startsWith("RX:")) {
            logClass = "log-rx";
            if (!filters.rx) return;
          } else if (msg.startsWith("TX")) {
            logClass = "log-tx";
            if (!filters.tx) return;
          } else if (msg.startsWith("STATE:")) {
            logClass = "log-state";
            if (!filters.state) return;
          } else if (msg.includes("error") || msg.includes("Error")) {
            logClass = "log-error";
            if (!filters.error) return;
          }

          addLog(msg, logClass);
        };
      }

      // WebSocket 정리 함수
      function cleanupWebSocket() {
        console.log("[MONITOR] Cleaning up WebSocket");
        stopMonitorSession();

        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (connectTimeoutTimer) {
          clearTimeout(connectTimeoutTimer);
          connectTimeoutTimer = null;
        }
        if (websocket) {
          if (websocket.readyState === WebSocket.OPEN || websocket.readyState === WebSocket.CONNECTING) {
            websocket.onclose = null; // 재연결 방지
            websocket.close(1000, "Page navigation"); // 정상 종료 코드
            console.log("[MONITOR] WebSocket closed");
          }
          websocket = null;
        }
      }

      // 페이지 떠날 때 정리 (여러 이벤트 사용)
      window.addEventListener("beforeunload", cleanupWebSocket);
      window.addEventListener("pagehide", cleanupWebSocket);

      // 페이지가 숨겨질 때 재연결 중지
      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          console.log("[MONITOR] Page hidden, stopping reconnect");
          if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
          }
        }
      });

      // 로그 추가
      function addLog(message, className = "") {
        const console = document.getElementById("console");
        const timestamp = new Date().toLocaleTimeString("ko-KR", { hour12: false });
        const logEntry = document.createElement("div");
        logEntry.className = className;
        logEntry.textContent = `[${timestamp}] ${message}`;
        console.appendChild(logEntry);

        if (autoScroll) {
          console.scrollTop = console.scrollHeight;
        }
      }

      // WebSocket 상태 업데이트
      function updateWSStatus(connected) {
        const indicator = document.getElementById("wsStatus");
        const text = document.getElementById("wsStatusText");
        if (connected) {
          indicator.className = "status-indicator status-connected";
          text.textContent = "연결됨";
        } else {
          indicator.className = "status-indicator status-disconnected";
          text.textContent = "연결 끊김";
        }
      }

      // 명령 전송
      async function sendCommand() {
        const input = document.getElementById("cmdInput");
        const cmd = input.value.replace(/\s/g, "").toUpperCase();

        if (!cmd) {
          alert("명령을 입력하세요.");
          return;
        }

        if (!/^[0-9A-F]+$/.test(cmd)) {
          alert("유효한 Hex 값이 아닙니다.");
          return;
        }

        if (cmd.length % 2 !== 0) {
          alert("Hex 길이는 짝수여야 합니다.");
          return;
        }

        try {
          const response = await fetch("/api/rs485/send", {
            method: "POST",
            headers: {
              "Content-Type": "text/plain",
            },
            body: cmd,
          });

          if (!response.ok) {
            let errorText = "";
            try {
              const errorJson = await response.json();
              errorText = errorJson.message || JSON.stringify(errorJson);
              renderTxDiag(errorJson);
            } catch (_e) {
              errorText = await response.text();
            }
            alert(`전송 실패: ${errorText || response.status}`);
            addLog(`CMD FAIL: ${cmd} (${errorText || response.status})`, "log-error");
            return;
          }

          try {
            const okJson = await response.json();
            renderTxDiag(okJson);
          } catch (_e) {
            // JSON 파싱 실패 시 정기 diag poll이 상태를 보정한다.
          }

          input.value = "";
          addLog(`CMD QUEUED: ${cmd}`, "log-tx");
        } catch (error) {
          alert("명령 전송 중 네트워크 오류가 발생했습니다.");
          addLog(`CMD FAIL: ${cmd} (network error)`, "log-error");
        }
      }

      // 빠른 명령 전송
      async function sendQuickCmd(hexCmd) {
        document.getElementById("cmdInput").value = hexCmd;
        await sendCommand();
      }

      // 콘솔 지우기
      function clearConsole() {
        document.getElementById("console").innerHTML = "";
      }

      // 자동 스크롤 토글
      function toggleAutoScroll() {
        autoScroll = !autoScroll;
        const btn = document.getElementById("autoScrollBtn");
        btn.textContent = `⬇️ 자동스크롤: ${autoScroll ? "ON" : "OFF"}`;
      }

      // 필터 토글
      function toggleFilter(type) {
        filters[type] = !filters[type];
        const btn = event.target;
        btn.classList.toggle("active");
      }

      // Enter 키로 전송 및 WebSocket 연결 시작
      document.addEventListener("DOMContentLoaded", function () {
        console.log("[MONITOR] DOM ready, starting WebSocket and attaching event listeners");

        // 서버에 모니터 활성 상태를 먼저 알림
        startMonitorSession();

        // 진단 패널 주기 갱신
        fetchTxDiag();
        txDiagTimer = setInterval(fetchTxDiag, 2000);

        // WebSocket 즉시 연결
        connectWebSocket();

        // 이벤트 리스너 등록
        document.getElementById("cmdInput").addEventListener("keypress", async function (e) {
          if (e.key === "Enter") {
            await sendCommand();
          }
        });
      });
    </script>
  </body>
</html>
