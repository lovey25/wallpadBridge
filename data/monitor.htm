<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RS485 Monitor - Wallpad Bridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/style.css" />
    <style>
      #console {
        height: 400px;
        background: #000;
        color: #0f0;
        font-family: "Courier New", monospace;
        font-size: 13px;
        overflow-y: auto;
        padding: 15px;
        border: 1px solid #555;
        border-radius: 5px;
        margin: 15px 0;
      }
      .log-rx {
        color: #00ff00;
      }
      .log-tx {
        color: #00aaff;
      }
      .log-state {
        color: #ffaa00;
      }
      .log-error {
        color: #ff4444;
      }
      .controls {
        display: flex;
        gap: 10px;
        margin: 15px 0;
      }
      .controls input {
        flex: 1;
        padding: 10px;
        background: #222;
        border: 1px solid #555;
        color: #fff;
        font-family: monospace;
        border-radius: 5px;
      }
      .controls button {
        padding: 10px 20px;
        background: #0066cc;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .controls button:hover {
        background: #0052a3;
      }
      .controls button.secondary {
        background: #555;
      }
      .controls button.secondary:hover {
        background: #666;
      }
      .filter-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 10px 0;
      }
      .filter-btn {
        padding: 8px 15px;
        background: #333;
        border: 1px solid #555;
        color: #fff;
        border-radius: 5px;
        cursor: pointer;
        font-size: 13px;
      }
      .filter-btn.active {
        background: #0066cc;
        border-color: #0066cc;
      }
      .status-indicator {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 8px;
      }
      .status-connected {
        background: #00ff00;
        box-shadow: 0 0 8px #00ff00;
      }
      .status-disconnected {
        background: #ff4444;
      }
      header {
        margin-bottom: 30px;
      }
      nav {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        padding: 10px 0;
        border-top: 1px solid #444;
      }
      nav a {
        padding: 8px 16px;
        background: rgba(42, 42, 62, 0.8);
        border: 1px solid #444;
        border-radius: 6px;
        text-decoration: none;
        color: #66b3ff;
        transition: all 0.3s;
      }
      nav a:hover {
        background: rgba(52, 52, 72, 0.9);
        border-color: #0066cc;
        text-decoration: none;
      }
      nav a.active {
        background: #0066cc;
        color: white;
        border-color: #0066cc;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📡 RS485 실시간 모니터</h1>
        <nav>
          <a href="/">대시보드</a>
          <a href="/monitor.htm" class="active">모니터</a>
          <a href="/wifi.htm">WiFi</a>
          <a href="/config.htm">설정</a>
        </nav>
      </header>

      <div class="card">
        <h3>
          <span id="wsStatus" class="status-indicator status-disconnected"></span>
          WebSocket 상태: <span id="wsStatusText">연결 중...</span>
        </h3>
      </div>

      <div class="card">
        <h3>필터</h3>
        <div class="filter-buttons">
          <button class="filter-btn active" onclick="toggleFilter('rx')">📥 RX (수신)</button>
          <button class="filter-btn active" onclick="toggleFilter('tx')">📤 TX (송신)</button>
          <button class="filter-btn active" onclick="toggleFilter('state')">🔄 상태 변경</button>
          <button class="filter-btn active" onclick="toggleFilter('error')">⚠️ 에러</button>
        </div>
      </div>

      <div class="card">
        <h3>로그 콘솔</h3>
        <div id="console"></div>
        <div class="controls">
          <button onclick="clearConsole()" class="secondary">🗑️ 지우기</button>
          <button onclick="toggleAutoScroll()" class="secondary" id="autoScrollBtn">⬇️ 자동스크롤: ON</button>
        </div>
      </div>

      <div class="card">
        <h3>RS485 명령 전송</h3>
        <div class="controls">
          <input type="text" id="cmdInput" placeholder="Hex 명령 입력 (예: F70B011901404011000AEE)" />
          <button onclick="sendCommand()">📤 전송</button>
        </div>
        <p style="font-size: 12px; color: #888">
          💡 팁: 공백 없이 Hex 값만 입력하세요. 프로토콜은 wallpad_protocol.md 참고
        </p>
      </div>

      <div class="card">
        <h3>빠른 테스트 명령</h3>
        <div class="controls">
          <button onclick="sendQuickCmd('F70B011901404011000AEE')">조명1 조회</button>
          <button onclick="sendQuickCmd('F70B012B014040110029EE')">환기 조회</button>
          <button onclick="sendQuickCmd('F70B011801454011003FEE')">거실 난방 조회</button>
        </div>
      </div>
    </div>

    <script>
      let websocket;
      let autoScroll = true;
      let filters = {
        rx: true,
        tx: true,
        state: true,
        error: true,
      };

      // WebSocket 연결
      function connectWebSocket() {
        const gateway = `ws://${window.location.hostname}/ws`;
        websocket = new WebSocket(gateway);

        websocket.onopen = function () {
          updateWSStatus(true);
          addLog("WebSocket 연결됨", "log-state");
        };

        websocket.onclose = function () {
          updateWSStatus(false);
          addLog("WebSocket 연결 끊김. 5초 후 재연결...", "log-error");
          setTimeout(connectWebSocket, 5000);
        };

        websocket.onerror = function (error) {
          addLog("WebSocket 에러: " + error, "log-error");
        };

        websocket.onmessage = function (event) {
          const msg = event.data;
          let logClass = "log-rx";

          if (msg.startsWith("RX:")) {
            logClass = "log-rx";
            if (!filters.rx) return;
          } else if (msg.startsWith("TX:")) {
            logClass = "log-tx";
            if (!filters.tx) return;
          } else if (msg.startsWith("STATE:")) {
            logClass = "log-state";
            if (!filters.state) return;
          } else if (msg.includes("error") || msg.includes("Error")) {
            logClass = "log-error";
            if (!filters.error) return;
          }

          addLog(msg, logClass);
        };
      }

      // 로그 추가
      function addLog(message, className = "") {
        const console = document.getElementById("console");
        const timestamp = new Date().toLocaleTimeString("ko-KR", { hour12: false });
        const logEntry = document.createElement("div");
        logEntry.className = className;
        logEntry.textContent = `[${timestamp}] ${message}`;
        console.appendChild(logEntry);

        if (autoScroll) {
          console.scrollTop = console.scrollHeight;
        }
      }

      // WebSocket 상태 업데이트
      function updateWSStatus(connected) {
        const indicator = document.getElementById("wsStatus");
        const text = document.getElementById("wsStatusText");
        if (connected) {
          indicator.className = "status-indicator status-connected";
          text.textContent = "연결됨";
        } else {
          indicator.className = "status-indicator status-disconnected";
          text.textContent = "연결 끊김";
        }
      }

      // 명령 전송
      function sendCommand() {
        const input = document.getElementById("cmdInput");
        const cmd = input.value.replace(/\s/g, "").toUpperCase();

        if (!cmd) {
          alert("명령을 입력하세요.");
          return;
        }

        if (!/^[0-9A-F]+$/.test(cmd)) {
          alert("유효한 Hex 값이 아닙니다.");
          return;
        }

        if (websocket.readyState !== WebSocket.OPEN) {
          alert("WebSocket이 연결되지 않았습니다.");
          return;
        }

        // Hex 문자열을 바이트 배열로 변환
        const bytes = [];
        for (let i = 0; i < cmd.length; i += 2) {
          bytes.push(parseInt(cmd.substr(i, 2), 16));
        }

        websocket.send(new Uint8Array(bytes));
        addLog("TX: " + cmd, "log-tx");
        input.value = "";
      }

      // 빠른 명령 전송
      function sendQuickCmd(hexCmd) {
        document.getElementById("cmdInput").value = hexCmd;
        sendCommand();
      }

      // 콘솔 지우기
      function clearConsole() {
        document.getElementById("console").innerHTML = "";
      }

      // 자동 스크롤 토글
      function toggleAutoScroll() {
        autoScroll = !autoScroll;
        const btn = document.getElementById("autoScrollBtn");
        btn.textContent = `⬇️ 자동스크롤: ${autoScroll ? "ON" : "OFF"}`;
      }

      // 필터 토글
      function toggleFilter(type) {
        filters[type] = !filters[type];
        const btn = event.target;
        btn.classList.toggle("active");
      }

      // Enter 키로 전송
      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("cmdInput").addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            sendCommand();
          }
        });
      });

      // 페이지 로드 시 WebSocket 연결
      window.onload = function () {
        connectWebSocket();
      };
    </script>
  </body>
</html>
