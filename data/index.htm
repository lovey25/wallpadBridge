<!doctype html>
<html>
  <head>
    <title>Wallpad Bridge Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: sans-serif;
        background: #222;
        color: #eee;
        padding: 20px;
      }
      #console {
        height: 300px;
        background: #000;
        overflow-y: scroll;
        padding: 10px;
        border: 1px solid #444;
        font-family: monospace;
      }
      .log-in {
        color: #0f0;
      }
      .log-out {
        color: #0af;
      }
      input,
      button {
        padding: 10px;
        margin: 5px 0;
        width: 100%;
        box-sizing: border-box;
      }
      .card {
        background: #333;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <h2>Wallpad RS485 Bridge</h2>
    <div class="card">
      <h3>Live Monitor</h3>
      <div id="console"></div>
      <input type="text" id="cmd" placeholder="Send Hex (e.g. F70B0101...)" />
      <button onclick="sendCmd()">Send RS485</button>
    </div>

    <div class="card">
      <h3>WiFi Setup</h3>
      <form action="/connect2ssid" method="POST">
        <input name="ssid" placeholder="SSID" />
        <input name="pass" type="password" placeholder="Password" />
        <button type="submit">Save & Reboot</button>
      </form>
    </div>

    <script>
      var gateway = `ws://${window.location.hostname}/ws`;
      var websocket;
      window.onload = () => {
        websocket = new WebSocket(gateway);
        websocket.onmessage = (e) => {
          const el = document.getElementById("console");
          el.innerHTML += `<div>${e.data}</div>`;
          el.scrollTop = el.scrollHeight;
        };
      };
      function sendCmd() {
        websocket.send(document.getElementById("cmd").value);
        document.getElementById("cmd").value = "";
      }
    </script>
  </body>
</html>
