<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Wallpad Bridge - 홈</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/style.css" />
    <style>
      .device-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 15px;
        margin: 20px 0;
      }
      .device-card {
        background: #333;
        padding: 15px;
        border-radius: 8px;
        border-left: 4px solid #0066cc;
      }
      .device-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .device-name {
        font-weight: bold;
        font-size: 16px;
      }
      .device-state {
        font-size: 14px;
        color: #888;
      }
      .nav-buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin: 20px 0;
      }
      .nav-btn {
        background: linear-gradient(135deg, #2a2a3e 0%, #1a1a2e 100%);
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        text-decoration: none;
        color: #fff;
        transition: all 0.3s;
        border: 1px solid #444;
      }
      .nav-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(0, 102, 204, 0.3);
        border-color: #0066cc;
      }
      .nav-btn-icon {
        font-size: 32px;
        margin-bottom: 10px;
      }
      .system-info {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
      }
      .info-box {
        background: #2a2a3e;
        padding: 15px;
        border-radius: 6px;
        text-align: center;
      }
      .info-label {
        font-size: 12px;
        color: #888;
        margin-bottom: 5px;
      }
      .info-value {
        font-size: 20px;
        font-weight: bold;
        color: #0066cc;
      }
      .refresh-button {
        float: right;
        padding: 5px 15px;
      }
      .project-link {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <span class="topbar-title">🏠 Wallpad Bridge</span>
      <nav class="topbar-nav">
        <a href="/" class="active">대시보드</a>
        <a href="/monitor.htm">모니터</a>
        <a href="/config.htm">설정</a>
      </nav>
    </div>
    <div class="page-content">
      <div class="card">
        <h3>시스템 상태</h3>
        <div class="system-info">
          <div class="info-box">
            <div class="info-label">WiFi</div>
            <div class="info-value" id="wifiStatus">...</div>
          </div>
          <div class="info-box">
            <div class="info-label">MQTT</div>
            <div class="info-value" id="mqttStatus">...</div>
          </div>
          <div class="info-box">
            <div class="info-label">작동시간</div>
            <div class="info-value" id="uptime">...</div>
          </div>
          <div class="info-box">
            <div class="info-label">메모리</div>
            <div class="info-value" id="memory">...</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>빠른 메뉴</h3>
        <div class="nav-buttons">
          <a href="/monitor.htm" class="nav-btn">
            <div class="nav-btn-icon">📡</div>
            <div>RS485 모니터</div>
          </a>
          <a href="/config.htm" class="nav-btn">
            <div class="nav-btn-icon">⚙️</div>
            <div>시스템 설정</div>
          </a>
          <a href="/api/devices" class="nav-btn" target="_blank" rel="noopener noreferrer">
            <div class="nav-btn-icon">📊</div>
            <div>장치 상태 API</div>
          </a>
          <a
            href="#"
            onclick="
              rebootDevice();
              return false;
            "
            class="nav-btn"
          >
            <div class="nav-btn-icon">🔄</div>
            <div>재부팅</div>
          </a>
        </div>
      </div>

      <div class="card">
        <h3>연결된 장치 <button onclick="loadDevices()" class="refresh-button">🔄 새로고침</button></h3>
        <div id="deviceList" class="device-grid">
          <p>장치 정보를 불러오는 중...</p>
        </div>
      </div>

      <div class="card">
        <h3>프로젝트 정보</h3>
        <p>
          <strong>Wallpad RS485-MQTT Bridge</strong><br />
          아파트 월패드 RS485 통신을 MQTT로 변환하여 Home Assistant와 연동합니다.
        </p>
        <p class="project-link">
          📖 <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub 문서</a> | 📝
          <a href="/preset.ini" target="_blank" rel="noopener noreferrer">프리셋 파일</a>
        </p>
      </div>
    </div>

    <script>
      // 시스템 상태 로드
      function loadSystemStatus() {
        fetch("/wifistatus")
          .then((res) => res.json())
          .then((data) => {
            // WiFi
            const wifiStatus = document.getElementById("wifiStatus");
            if (data.connected) {
              wifiStatus.textContent = "연결됨";
              wifiStatus.style.color = "#10b981";
            } else {
              wifiStatus.textContent = "AP 모드";
              wifiStatus.style.color = "#f59e0b";
            }

            // MQTT
            const mqttEl = document.getElementById("mqttStatus");
            if (data.mqtt_connected) {
              mqttEl.textContent = "연결됨";
              mqttEl.style.color = "#10b981";
            } else {
              mqttEl.textContent = "끊김";
              mqttEl.style.color = "#f87171";
            }

            // 작동시간
            if (data.uptime_ms !== undefined) {
              const totalSec = Math.floor(data.uptime_ms / 1000);
              const h = Math.floor(totalSec / 3600);
              const m = Math.floor((totalSec % 3600) / 60);
              const s = totalSec % 60;
              const pad = (n) => String(n).padStart(2, "0");
              document.getElementById("uptime").textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
              document.getElementById("uptime").style.color = "#0066cc";
            }

            // 메모리 (Heap)
            if (data.free_heap !== undefined) {
              const kb = (data.free_heap / 1024).toFixed(1);
              document.getElementById("memory").textContent = `${kb}K`;
              document.getElementById("memory").style.color = data.free_heap < 15000 ? "#f87171" : "#10b981";
            }
          })
          .catch((err) => {
            document.getElementById("wifiStatus").textContent = "오류";
          });
      }

      // 장치 목록 로드
      function loadDevices() {
        const deviceList = document.getElementById("deviceList");
        deviceList.innerHTML = "<p>불러오는 중...</p>";

        fetch("/api/devices")
          .then((res) => res.json())
          .then((devices) => {
            if (devices.length === 0) {
              deviceList.innerHTML = "<p>등록된 장치가 없습니다. RS485 통신이 시작되면 자동으로 표시됩니다.</p>";
              return;
            }

            deviceList.innerHTML = "";
            devices.forEach((device) => {
              const card = document.createElement("div");
              card.className = "device-card";

              let deviceInfo = "";
              if (device.device === "light") {
                deviceInfo = `
                                <div class="device-header">
                                    <span class="device-name">💡 조명 ${device.address}</span>
                                    <span class="badge ${device.state === "ON" ? "badge-success" : "badge-danger"}">${device.state}</span>
                                </div>
                            `;
              } else if (device.device === "fan") {
                deviceInfo = `
                                <div class="device-header">
                                    <span class="device-name">🌀 환기</span>
                                    <span class="badge ${device.state === "ON" ? "badge-success" : "badge-danger"}">${device.state}</span>
                                </div>
                                <div class="device-state">풍량: ${device.speed}</div>
                            `;
              } else if (device.device === "climate") {
                deviceInfo = `
                                <div class="device-header">
                                    <span class="device-name">🌡️ 난방 (방 ${device.room})</span>
                                    <span class="badge badge-primary">${device.mode}</span>
                                </div>
                                <div class="device-state">현재: ${device.current_temp}°C | 목표: ${device.target_temp}°C</div>
                            `;
              } else if (device.device === "doorlock") {
                deviceInfo = `
                                <div class="device-header">
                                    <span class="device-name">🔒 도어락</span>
                                    <span class="badge ${device.state === "OPEN" ? "badge-warning" : "badge-success"}">${device.state}</span>
                                </div>
                            `;
              }

              card.innerHTML = deviceInfo;
              deviceList.appendChild(card);
            });
          })
          .catch((err) => {
            deviceList.innerHTML = "<p>장치 정보를 불러올 수 없습니다.</p>";
            console.error("Load devices error:", err);
          });
      }

      // 재부팅
      function rebootDevice() {
        if (confirm("장치를 재부팅하시겠습니까?")) {
          fetch("/reboot", { method: "POST" })
            .then(() => {
              alert("재부팅 중입니다. 잠시 후 다시 접속하세요.");
            })
            .catch(() => {
              // 재부팅으로 인한 연결 끊김은 정상
            });
        }
      }

      // 페이지 로드 시 실행
      window.onload = function () {
        loadSystemStatus();
        loadDevices();

        // 5초마다 자동 새로고침
        setInterval(() => {
          loadSystemStatus();
        }, 5000);
      };
    </script>
  </body>
</html>
